name: Fixed openvela release build

on:
  schedule:
    # 02:30 Asia/Shanghai. The upstream release is pinned by the repository
    # versions file loaded below; the run validates the default branch against it.
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      build_jobs:
        description: Parallel jobs for the openvela build
        required: true
        default: "2"
        type: choice
        options:
          - "2"
          - "4"
      q3_native_e2e:
        description: Run storage-backed three-boot Workout/History E2E
        required: true
        default: false
        type: boolean
      q3_soak_seconds:
        description: Q3 measured soak seconds (adds a 300 second warmup)
        required: true
        default: "0"
        type: choice
        options:
          - "0"
          - "1800"
      q4_native_e2e:
        description: Run reviewed native Q4 notification journey
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: openvela-release-build-${{ github.ref }}
  cancel-in-progress: false

env:
  OPENVELA_MANIFEST_URL: https://github.com/open-vela/manifests.git
  OPENVELA_MANIFEST_UPSTREAM: dev
  REPO_VERSION: "2.54"
  REPO_SHA256: 6cba294d6218bbd4a1500598207b3979c752c7a122aef9429e4d7fef688833b5
  OPENVELA_ROOT: ${{ github.workspace }}/openvela
  EVIDENCE_DIR: ${{ github.workspace }}/openvela-nightly-evidence
  SMART_BAND_BUILD_JOBS: ${{ inputs.build_jobs || '2' }}
  SMART_BAND_STORAGE_PATH: ${{ inputs.q3_native_e2e && '/data/smart-band-q3' || '' }}
  SMART_BAND_E2E_DIAGNOSTICS: ${{ (inputs.q3_native_e2e || inputs.q4_native_e2e) && '1' || '0' }}

jobs:
  goldfish-arm64:
    name: Goldfish arm64 release build
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Check out smart-band source
        uses: actions/checkout@v7
        with:
          path: smart-band-demo

      - name: Load repository-owned openvela versions
        shell: bash
        run: |
          set -Eeuo pipefail
          version_file="$GITHUB_WORKSPACE/smart-band-demo/skills/openvela-smart-band-reproduce/versions.env"
          test -f "$version_file"
          # shellcheck disable=SC1090
          source "$version_file"

          for name in \
            SMART_BAND_DEFAULT_CLAUDE_REPOSITORY \
            SMART_BAND_DEFAULT_CLAUDE_REVISION \
            SMART_BAND_DEFAULT_OPENVELA_MANIFEST_REVISION \
            SMART_BAND_DEFAULT_OPENVELA_MANIFEST_FILE \
            SMART_BAND_DEFAULT_OPENVELA_EMULATOR_REPOSITORY \
            SMART_BAND_DEFAULT_OPENVELA_EMULATOR_REVISION \
            SMART_BAND_DEFAULT_OPENVELA_EMULATOR_TOOLS_REVISION; do
            test -n "${!name:-}"
          done
          [[ "$SMART_BAND_DEFAULT_CLAUDE_REVISION" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SMART_BAND_DEFAULT_OPENVELA_MANIFEST_REVISION" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SMART_BAND_DEFAULT_OPENVELA_EMULATOR_REVISION" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SMART_BAND_DEFAULT_OPENVELA_EMULATOR_TOOLS_REVISION" =~ ^[0-9a-f]{40}$ ]]
          case "$SMART_BAND_DEFAULT_OPENVELA_MANIFEST_FILE" in
            ''|/*|*..*) exit 1 ;;
          esac

          {
            echo "OPENVELA_CLAUDE_URL=$SMART_BAND_DEFAULT_CLAUDE_REPOSITORY"
            echo "OPENVELA_CLAUDE_REVISION=$SMART_BAND_DEFAULT_CLAUDE_REVISION"
            echo "OPENVELA_MANIFEST_REVISION=$SMART_BAND_DEFAULT_OPENVELA_MANIFEST_REVISION"
            echo "OPENVELA_MANIFEST_FILE=$SMART_BAND_DEFAULT_OPENVELA_MANIFEST_FILE"
            echo "OPENVELA_EMULATOR_URL=$SMART_BAND_DEFAULT_OPENVELA_EMULATOR_REPOSITORY"
            echo "OPENVELA_EMULATOR_REVISION=$SMART_BAND_DEFAULT_OPENVELA_EMULATOR_REVISION"
            echo "OPENVELA_EMULATOR_TOOLS_REVISION=$SMART_BAND_DEFAULT_OPENVELA_EMULATOR_TOOLS_REVISION"
          } >> "$GITHUB_ENV"

      - name: Record runner and reclaim build space
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$EVIDENCE_DIR"
          {
            uname -a
            lsb_release -a 2>/dev/null || true
            df -h
          } | tee "$EVIDENCE_DIR/runner-before.txt"

          # Hosted runners are ephemeral. These SDKs are unrelated to the
          # openvela build and removing them leaves enough room for repo sync.
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune --all --force >/dev/null 2>&1 || true
          df -h | tee "$EVIDENCE_DIR/runner-after-cleanup.txt"

      - name: Install deterministic checkout prerequisites
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            bison build-essential ca-certificates ccache cmake curl file flex \
            gawk git git-lfs gperf libncurses-dev make ninja-build python3 \
            python3-pip rsync unzip xz-utils zip

          mkdir -p "$HOME/bin"
          curl --fail --location --retry 5 --retry-delay 2 \
            --connect-timeout 10 --max-time 120 \
            --output "$HOME/bin/repo" \
            "https://storage.googleapis.com/git-repo-downloads/repo-$REPO_VERSION"
          echo "$REPO_SHA256  $HOME/bin/repo" | sha256sum --check --strict
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Initialize pinned openvela release manifest
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$OPENVELA_ROOT" "$EVIDENCE_DIR"
          cd "$OPENVELA_ROOT"

          repo init \
            --manifest-url="$OPENVELA_MANIFEST_URL" \
            --manifest-branch="$OPENVELA_MANIFEST_REVISION" \
            --manifest-upstream-branch="$OPENVELA_MANIFEST_UPSTREAM" \
            --manifest-name="$OPENVELA_MANIFEST_FILE" \
            --repo-rev="v$REPO_VERSION" \
            --manifest-depth=0 \
            --depth=1 \
            --partial-clone \
            --clone-filter=blob:limit=10M \
            --no-clone-bundle

          test "$(git -C .repo/manifests rev-parse HEAD)" = \
            "$OPENVELA_MANIFEST_REVISION"
          python3 - ".repo/manifests/$OPENVELA_MANIFEST_FILE" <<'PY'
          import re
          import sys
          import xml.etree.ElementTree as ET

          manifest = ET.parse(sys.argv[1]).getroot()
          default_revision = manifest.find("default").get("revision", "")
          if not default_revision.startswith("refs/tags/"):
              raise SystemExit(
                  f"manifest default is not a fixed tag: {default_revision!r}"
              )
          for project in manifest.findall("project"):
              revision = project.get("revision")
              if revision and not (
                  revision.startswith("refs/tags/")
                  or re.fullmatch(r"[0-9a-f]{40}", revision)
              ):
                  raise SystemExit(
                      f"project {project.get('name')} has floating revision {revision!r}"
                  )
          print(f"manifest uses fixed release {default_revision}")
          PY

      - name: Sync pinned openvela projects
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$OPENVELA_ROOT"
          timeout --signal=TERM --kill-after=5m 65m \
            repo sync \
              --current-branch \
              --detach \
              --fail-fast \
              --force-sync \
              --no-clone-bundle \
              --optimized-fetch \
              --prune \
              -j4 2>&1 | tee "$EVIDENCE_DIR/repo-sync.log"

          repo manifest -r -o "$EVIDENCE_DIR/openvela-resolved-manifest.xml"
          repo version > "$EVIDENCE_DIR/repo-version.txt"
          repo status > "$EVIDENCE_DIR/repo-status-after-sync.txt"

          python3 - "$EVIDENCE_DIR/openvela-resolved-manifest.xml" <<'PY'
          import re
          import sys
          import xml.etree.ElementTree as ET

          manifest = ET.parse(sys.argv[1]).getroot()
          projects = manifest.findall("project")
          if not projects:
              raise SystemExit("resolved manifest contains no projects")

          bad = [
              (project.get("name"), project.get("revision"))
              for project in projects
              if not re.fullmatch(r"[0-9a-f]{40}", project.get("revision", ""))
          ]
          if bad:
              raise SystemExit(f"resolved manifest has non-SHA revisions: {bad[:5]}")
          print(f"verified {len(projects)} projects at immutable SHA revisions")
          PY

      - name: Sync pinned Linux emulator runtime
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$OPENVELA_ROOT"

          timeout --signal=TERM --kill-after=2m 15m \
            repo sync \
              --current-branch \
              --detach \
              --fail-fast \
              --force-sync \
              --no-clone-bundle \
              --optimized-fetch \
              --prune \
              -j2 \
              prebuilts/emulator/linux-x86_64 2>&1 | \
            tee "$EVIDENCE_DIR/emulator-sync.log"

          emulator_root="$OPENVELA_ROOT/prebuilts/emulator/linux-x86_64"
          tools_root="$OPENVELA_ROOT/prebuilts/emulator/tools"
          test "$(git -C "$emulator_root" rev-parse HEAD)" = \
            "$OPENVELA_EMULATOR_REVISION"
          test "$(git -C "$tools_root" rev-parse HEAD)" = \
            "$OPENVELA_EMULATOR_TOOLS_REVISION"

          emulator_remote="$(git -C "$emulator_root" remote | head -n 1)"
          test -n "$emulator_remote"
          emulator_remote_url="$(git -C "$emulator_root" remote get-url \
            "$emulator_remote")"
          emulator_https_base="${OPENVELA_EMULATOR_URL%.git}"
          case "$emulator_remote_url" in
            "$OPENVELA_EMULATOR_URL"|"$emulator_https_base"|\
            git@github.com:open-vela/prebuilts_emulator_linux-x86_64.git)
              ;;
            *)
              echo "unexpected emulator remote: $emulator_remote_url" >&2
              exit 1
              ;;
          esac

          test -x "$emulator_root/emulator"
          test -x \
            "$emulator_root/qemu/linux-x86_64/qemu-system-aarch64-headless"
          git -C "$emulator_root" rev-parse HEAD \
            > "$EVIDENCE_DIR/emulator-commit.txt"
          git -C "$tools_root" rev-parse HEAD \
            > "$EVIDENCE_DIR/emulator-tools-commit.txt"
          (
            cd "$emulator_root"
            sha256sum \
              emulator \
              qemu/linux-x86_64/qemu-system-aarch64-headless
          ) > "$EVIDENCE_DIR/emulator-binaries.sha256"

      - name: Install pinned official openvela skills
        shell: bash
        run: |
          set -Eeuo pipefail
          claude_root="$OPENVELA_ROOT/.claude"
          if [ -e "$claude_root" ]; then
            git -C "$claude_root" rev-parse --git-dir >/dev/null
            test -z "$(git -C "$claude_root" status --porcelain)"

            # reproduce.sh recognizes an installed official skill checkout by
            # a directory/symlink at .claude/.git. If repo used a gitfile on a
            # future version, replace only this ephemeral worktree with a
            # normal clone so the script cannot attempt a second clone.
            if [ ! -d "$claude_root/.git" ]; then
              rm -rf "$claude_root"
              git clone --filter=blob:none --no-checkout \
                "$OPENVELA_CLAUDE_URL" "$claude_root"
            fi
          else
            git clone --filter=blob:none --no-checkout \
              "$OPENVELA_CLAUDE_URL" "$claude_root"
          fi

          claude_remote="$(git -C "$claude_root" remote | head -n 1)"
          test -n "$claude_remote"
          claude_remote_url="$(git -C "$claude_root" remote get-url \
            "$claude_remote")"
          case "$claude_remote_url" in
            https://github.com/open-vela/.claude|\
            https://github.com/open-vela/.claude.git|\
            git@github.com:open-vela/.claude.git)
              ;;
            *)
              echo "unexpected .claude remote: $claude_remote_url" >&2
              exit 1
              ;;
          esac

          git -C "$claude_root" fetch --depth=1 "$claude_remote" \
            "$OPENVELA_CLAUDE_REVISION"
          git -C "$OPENVELA_ROOT/.claude" checkout --detach \
            "$OPENVELA_CLAUDE_REVISION"
          test "$(git -C "$OPENVELA_ROOT/.claude" rev-parse HEAD)" = \
            "$OPENVELA_CLAUDE_REVISION"

      - name: Build smart band in pinned openvela release
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$GITHUB_WORKSPACE/smart-band-demo"
          timeout --signal=TERM --kill-after=5m 75m \
            bash scripts/reproduce_openvela_demo.sh \
              --openvela-root "$OPENVELA_ROOT" \
              --no-browser \
              --allow-dirty 2>&1 | tee "$EVIDENCE_DIR/openvela-build.log"

      - name: Verify linked smart-band image
        shell: bash
        run: |
          set -Eeuo pipefail
          image=""
          for candidate in \
            "$OPENVELA_ROOT/cmake_out/vela_goldfish-arm64-v8a-ap/nuttx" \
            "$OPENVELA_ROOT/nuttx/nuttx"; do
            if [ -s "$candidate" ]; then
              image="$candidate"
              break
            fi
          done
          test -n "$image"

          config=""
          for candidate in \
            "$OPENVELA_ROOT/nuttx/.config" \
            "$OPENVELA_ROOT/cmake_out/vela_goldfish-arm64-v8a-ap/.config"; do
            if [ -f "$candidate" ]; then
              config="$candidate"
              break
            fi
          done
          test -n "$config"
          grep -Fq 'CONFIG_LVX_USE_DEMO_SMART_BAND_BASIC=y' "$config"
          if [ "${{ inputs.q3_native_e2e }}" = "true" ]; then
            grep -Fq 'CONFIG_LVX_DEMO_SMART_BAND_STORAGE_PATH="/data/smart-band-q3"' \
              "$config"
          fi
          if [ "${{ inputs.q3_native_e2e || inputs.q4_native_e2e }}" = "true" ]; then
            grep -Fq 'CONFIG_LVX_DEMO_SMART_BAND_E2E_DIAGNOSTICS=y' "$config"
            grep -Fq 'CONFIG_FS_PROCFS=y' "$config"
            grep -Fq 'CONFIG_MM_RECORD_PID=y' "$config"
            grep -Fq 'CONFIG_NSH_PROC_MOUNTPOINT="/proc"' "$config"
            grep -Fq 'CONFIG_STACK_COLORATION=y' "$config"
          fi
          if ! readelf --symbols --wide "$image" 2>/dev/null | \
               grep -Eq 'smart_band(_main)?'; then
            strings "$image" | grep -Fq 'smart_band'
          fi

          file "$image" | tee "$EVIDENCE_DIR/nuttx-file.txt"
          cp "$image" "$EVIDENCE_DIR/nuttx"
          cp "$config" "$EVIDENCE_DIR/nuttx.config"
          (
            cd "$EVIDENCE_DIR"
            sha256sum nuttx
          ) | tee "$EVIDENCE_DIR/nuttx.sha256"
          runtime_dir="$OPENVELA_ROOT/cmake_out/vela_goldfish-arm64-v8a-ap"
          target_elf="$runtime_dir/vela_ap.elf"
          linker_map="$runtime_dir/nuttx.map"
          system_map="$runtime_dir/System.map"
          test -s "$target_elf"
          test -s "$linker_map"
          test -s "$system_map"
          cp "$target_elf" "$EVIDENCE_DIR/vela_ap.elf"
          cp "$linker_map" "$EVIDENCE_DIR/nuttx.map"
          cp "$system_map" "$EVIDENCE_DIR/System.map"
          (
            cd "$EVIDENCE_DIR"
            sha256sum vela_ap.elf nuttx.map System.map
          ) | tee "$EVIDENCE_DIR/target-linker-artifacts.sha256"
          file "$target_elf" | tee "$EVIDENCE_DIR/target-elf-file.txt"
          size -A -d "$target_elf" | tee "$EVIDENCE_DIR/target-elf-sections.txt"
          readelf -h -SW "$target_elf" \
            > "$EVIDENCE_DIR/target-elf-readelf.txt"
          readelf --symbols --wide "$target_elf" | \
            grep -E 'smart_band|notification' \
            > "$EVIDENCE_DIR/target-smart-band-symbols.txt"
          test -s "$EVIDENCE_DIR/target-smart-band-symbols.txt"
          grep -E 'smart_band|notification' "$linker_map" \
            > "$EVIDENCE_DIR/target-smart-band-map-lines.txt"
          test -s "$EVIDENCE_DIR/target-smart-band-map-lines.txt"
          for runtime_image in vela_system.bin vela_data.bin; do
            test -s "$runtime_dir/$runtime_image"
            cp "$runtime_dir/$runtime_image" "$EVIDENCE_DIR/$runtime_image"
          done
          (
            cd "$runtime_dir"
            sha256sum vela_system.bin vela_data.bin
          ) | tee "$EVIDENCE_DIR/runtime-images.sha256"
          find "$OPENVELA_ROOT/cmake_out" "$OPENVELA_ROOT/nuttx" \
            -iname '*smart_band*' -print 2>/dev/null \
            > "$EVIDENCE_DIR/smart-band-build-paths.txt"
          test -s "$EVIDENCE_DIR/smart-band-build-paths.txt"

      - name: Boot compact emulator and capture Lotus
        shell: bash
        run: |
          set -Eeuo pipefail
          timeout --signal=TERM --kill-after=30s 8m \
            python3 "$GITHUB_WORKSPACE/smart-band-demo/scripts/smoke_openvela_emulator.py" \
              --openvela-root "$OPENVELA_ROOT" \
              --evidence-dir "$EVIDENCE_DIR" \
              --skin xiaomi_smart_band_8_pro \
              --screenshot-width 336 \
              --screenshot-height 480 \
              --exercise-watch-face-picker

      - name: Compare compact Lotus to the pre-migration native reference
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 \
            "$GITHUB_WORKSPACE/smart-band-demo/scripts/compare_native_watch_face.py" \
              --profile compact \
              --candidate "$EVIDENCE_DIR/watch-face.png" \
              --output "$EVIDENCE_DIR/compact-watch-face-comparison.json"

      - name: Run audited native screenshot and sensor journey
        shell: bash
        run: |
          set -Eeuo pipefail
          timeout --signal=TERM --kill-after=30s 12m \
            python3 "$GITHUB_WORKSPACE/smart-band-demo/scripts/run_native_e2e.py" \
              --openvela-root "$OPENVELA_ROOT" \
              --evidence-dir "$EVIDENCE_DIR/native-e2e" \
              --console-port 5564

      - name: Run storage-backed Q3 recovery and History journey
        if: inputs.q3_native_e2e
        shell: bash
        run: |
          set -Eeuo pipefail
          soak_seconds="${{ inputs.q3_soak_seconds }}"
          warmup_seconds=0
          timeout_minutes=18
          if [ "$soak_seconds" -gt 0 ]; then
            warmup_seconds=300
            timeout_minutes=70
          fi
          timeout --signal=TERM --kill-after=30s "${timeout_minutes}m" \
            python3 "$GITHUB_WORKSPACE/smart-band-demo/scripts/run_q3_native_e2e.py" \
              --openvela-root "$OPENVELA_ROOT" \
              --evidence-dir "$EVIDENCE_DIR/q3-native" \
              --console-port 5565 \
              --storage-path /data/smart-band-q3 \
              --warmup-seconds "$warmup_seconds" \
              --soak-seconds "$soak_seconds" \
              --sample-interval-seconds 10

      - name: Run reviewed native Q4 notification journey
        if: inputs.q4_native_e2e
        shell: bash
        run: |
          set -Eeuo pipefail
          timeout --signal=TERM --kill-after=30s 35m \
            python3 "$GITHUB_WORKSPACE/smart-band-demo/scripts/run_q4_native_e2e.py" \
              --openvela-root "$OPENVELA_ROOT" \
              --evidence-dir "$EVIDENCE_DIR/q4-native" \
              --console-port 5566

      - name: Ensure emulator process group is stopped
        if: always()
        shell: bash
        run: |
          set +e
          cleanup_log="$EVIDENCE_DIR/workflow-emulator-cleanup.txt"
          mkdir -p "$EVIDENCE_DIR"
          mapfile -d '' process_files < <(
            find "$EVIDENCE_DIR" -type f -name emulator-process.json -print0
          )

          python3 - \
            "$GITHUB_WORKSPACE/smart-band-demo/scripts/run_native_e2e.py" \
            "$cleanup_log" "$EVIDENCE_DIR" "$OPENVELA_ROOT" \
            "${{ inputs.q4_native_e2e }}" "${process_files[@]}" <<'PY'
          import importlib.util
          import json
          import re
          import sys
          from pathlib import Path

          helper_path = Path(sys.argv[1])
          cleanup_log = Path(sys.argv[2])
          evidence_dir = Path(sys.argv[3]).resolve()
          openvela_root = Path(sys.argv[4]).resolve()
          q4_enabled = sys.argv[5] == "true"
          process_files = [Path(value) for value in sys.argv[6:]]
          spec = importlib.util.spec_from_file_location(
              "workflow_native_cleanup", helper_path
          )
          if spec is None or spec.loader is None:
              raise SystemExit(f"cannot load cleanup helper: {helper_path}")
          native = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(native)

          failed = False
          lines = []
          q4_metadata_count = 0
          q4_scenarios_seen = set()
          required_q4_scenarios = {
              "ordinary", "center", "calls", "workout"
          }
          q4_scenarios_root = (
              evidence_dir / "q4-native" / "scenarios"
          ).resolve()
          expected_executables = (
              (
                  openvela_root
                  / "prebuilts/emulator/linux-x86_64/emulator"
              ).resolve(),
              (
                  openvela_root
                  / "prebuilts/emulator/linux-x86_64/qemu/"
                  "linux-x86_64/qemu-system-aarch64-headless"
              ).resolve(),
          )
          for process_file in process_files:
              resolved_file = process_file.resolve()
              is_q4 = q4_scenarios_root in resolved_file.parents
              if not is_q4:
                  lines.append(
                      f"{process_file}: skipped legacy metadata without "
                      "Q4 run/runtime attribution"
                  )
                  continue
              q4_metadata_count += 1
              try:
                  metadata = json.loads(process_file.read_text(encoding="utf-8"))
                  if not isinstance(metadata, dict):
                      raise ValueError("metadata root is not an object")
                  required = {
                      "run_id", "runtime_output", "executables", "baseline"
                  }
                  if not required.issubset(metadata):
                      raise ValueError("required attribution fields are missing")
                  scenario = process_file.parent.name
                  if scenario not in required_q4_scenarios:
                      raise ValueError(f"invalid Q4 scenario path: {scenario}")
                  if process_file.parent.parent.resolve() != q4_scenarios_root:
                      raise ValueError("Q4 metadata is outside the scenario root")
                  run_id = metadata["run_id"]
                  if (
                      not isinstance(run_id, str)
                      or re.fullmatch(
                          rf"[0-9a-f]{{32}}-{scenario}", run_id
                      )
                      is None
                  ):
                      raise ValueError("invalid Q4 run id")
                  expected_runtime = (
                      process_file.parent / "runtime-output"
                  ).resolve()
                  runtime_output = metadata["runtime_output"]
                  if (
                      not isinstance(runtime_output, str)
                      or Path(runtime_output).resolve() != expected_runtime
                  ):
                      raise ValueError("invalid Q4 runtime-output attribution")
                  executables = metadata["executables"]
                  if (
                      not isinstance(executables, list)
                      or len(executables) != len(expected_executables)
                      or tuple(Path(value).resolve() for value in executables)
                      != expected_executables
                  ):
                      raise ValueError("invalid Q4 executable attribution")
                  if not isinstance(metadata["baseline"], list):
                      raise ValueError("invalid Q4 process baseline")
                  q4_scenarios_seen.add(scenario)
                  result = native.cleanup_attributed_processes(
                      run_id,
                      expected_runtime,
                      expected_executables,
                      [],
                  )
                  output = process_file.with_name(
                      "workflow-process-cleanup.json"
                  )
                  native.write_json(output, result)
                  lines.append(
                      f"{process_file}: absent={result['absent']} "
                      f"actions={len(result['actions'])}"
                  )
                  failed = failed or not result["absent"]
              except Exception as exc:
                  lines.append(f"{process_file}: invalid Q4 metadata: {exc}")
                  failed = True
                  continue
          if q4_enabled and q4_metadata_count == 0:
              lines.append(
                  "Q4 native journey was enabled but no attributed "
                  "emulator metadata was recorded"
              )
              failed = True
          if q4_enabled and q4_scenarios_seen != required_q4_scenarios:
              lines.append(
                  "Q4 attributed metadata scenario set mismatch: "
                  f"seen={sorted(q4_scenarios_seen)} "
                  f"required={sorted(required_q4_scenarios)}"
              )
              failed = True
          if not process_files:
              lines.append("no emulator process metadata was recorded")
          cleanup_log.write_text("\n".join(lines) + "\n", encoding="utf-8")
          raise SystemExit(1 if failed else 0)
          PY

      - name: Capture final diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p "$EVIDENCE_DIR"
          df -h > "$EVIDENCE_DIR/runner-final-disk.txt"
          if [ -d "$OPENVELA_ROOT/.repo" ]; then
            cd "$OPENVELA_ROOT"
            repo status > "$EVIDENCE_DIR/repo-status-final.txt" 2>&1
            git -C .repo/manifests rev-parse HEAD \
              > "$EVIDENCE_DIR/manifest-commit.txt" 2>&1
          fi
          if [ -d "$OPENVELA_ROOT/.claude/.git" ]; then
            git -C "$OPENVELA_ROOT/.claude" rev-parse HEAD \
              > "$EVIDENCE_DIR/claude-commit.txt" 2>&1
          fi
          if [ -f "$OPENVELA_ROOT/nuttx/.config" ]; then
            cp "$OPENVELA_ROOT/nuttx/.config" "$EVIDENCE_DIR/nuttx.config"
          fi
          python3 - \
            "$GITHUB_WORKSPACE/smart-band-demo/scripts/run_native_e2e.py" \
            "$EVIDENCE_DIR" <<'PY'
          import importlib.util
          import sys
          from pathlib import Path

          helper_path = Path(sys.argv[1])
          evidence_dir = Path(sys.argv[2])
          spec = importlib.util.spec_from_file_location(
              "workflow_evidence_manifest", helper_path
          )
          if spec is None or spec.loader is None:
              raise SystemExit(f"cannot load evidence helper: {helper_path}")
          native = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(native)
          count = native.write_evidence_manifest(evidence_dir)
          print(f"root evidence manifest entries: {count}")
          PY

      - name: Upload build evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: openvela-fixed-release-${{ github.run_id }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 14
