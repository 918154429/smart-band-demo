name: Host tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  production-watch-model:
    name: Model and provider (${{ matrix.os }}, ${{ matrix.compiler }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Compile and run production watch model test
        run: python tests/test_watch_model.py

  production-time-apps:
    name: Time apps (${{ matrix.os }}, ${{ matrix.compiler }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Compile and run production Timer and Stopwatch tests
        run: python tests/test_time_apps.py

  production-app-runtime:
    name: App runtime (${{ matrix.os }}, ${{ matrix.compiler }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Compile and run production app runtime tests
        run: python tests/test_app_runtime.py

  production-central-runtime:
    name: Central runtime (${{ matrix.os }}, ${{ matrix.compiler }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Compile and run central runtime tests
        run: python tests/test_runtime_core.py

  production-storage-core:
    name: Storage core (${{ matrix.os }}, ${{ matrix.compiler }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Compile and run versioned storage and fault tests
        run: python tests/test_storage_core.py

  production-app-logic:
    name: App logic (${{ matrix.os }}, ${{ matrix.compiler }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Compile and run production app logic tests
        run: python tests/test_app_logic.py

  production-watch-face-registry:
    name: Watch face registry (${{ matrix.os }}, ${{ matrix.compiler }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Compile and run watch face registry tests
        run: python tests/test_watch_face_registry.py

  production-w1-pure-cores:
    name: ${{ matrix.target.name }} (${{ matrix.toolchain.os }}, ${{ matrix.toolchain.compiler }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Workout core
            script: tests/test_workout_core.py
          - name: Notification core
            script: tests/test_notification_core.py
          - name: Power policy
            script: tests/test_power_policy.py
          - name: Sync protocol
            script: tests/test_sync_protocol.py
        toolchain:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.toolchain.os }}
    env:
      CC: ${{ matrix.toolchain.compiler }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Compile and run W1 pure core tests
        run: python ${{ matrix.target.script }}

  production-core-coverage:
    name: Production C core line coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Install pinned coverage reporter
        run: python -m pip install gcovr==8.6
      - name: Enforce at least 85 percent production C core coverage
        env:
          CC: gcc
        run: python tests/test_core_coverage.py

  production-ui-compile:
    name: UI compile smoke (${{ matrix.os }}, ${{ matrix.compiler }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Compile and link all production UI and app sources
        run: python tests/test_ui_compile.py

  evidence-harness:
    name: Evidence harness (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Validate native evidence harnesses
        run: |
          python tests/test_emulator_smoke.py
          python tests/test_q0_baseline.py
          python tests/test_native_e2e.py

  shell-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate shell executable bits
        run: |
          test "$(git ls-files -s scripts/reproduce_openvela_demo.sh | awk '{print $1}')" = 100755
          test "$(git ls-files -s scripts/roll_emulator_sensors.sh | awk '{print $1}')" = 100755
          test "$(git ls-files -s scripts/smoke_openvela_emulator.py | awk '{print $1}')" = 100755
          test "$(git ls-files -s skills/openvela-smart-band-reproduce/scripts/reproduce.sh | awk '{print $1}')" = 100755
      - name: Validate shell syntax
        run: bash -n scripts/*.sh skills/openvela-smart-band-reproduce/scripts/*.sh
      - name: Verify reproduction failure rollback
        run: bash scripts/test_reproduce_failure.sh
      - name: Validate application registry and 2048 rename
        run: |
          for source in \
            services/event_queue.c \
            services/event_inbox.c \
            services/clock.c \
            services/capabilities.c \
            services/runtime.c \
            services/storage_codec.c \
            services/store.c \
            services/sync_protocol.c \
            platform/platform_noop.c \
            platform/loopback/sync_loopback.c \
            platform/storage/storage_fault.c \
            platform/storage/storage_memory.c \
            platform/storage/storage_file.c \
            apps/game_2048_app.c \
            logic/calculator_model.c \
            logic/game_2048_model.c \
            logic/mines_model.c \
            logic/step_normalizer.c \
            logic/workout_model.c \
            logic/notification_model.c \
            logic/notification_demo.c \
            logic/power_policy.c \
            ui/lvgl/components.c \
            ui/lvgl/faces/lotus_face.c \
            ui/lvgl/faces/watch_face_registry.c \
            ui/lvgl/watch_pages.c; do
            grep -q "$source" openvela_app/smart_band/CMakeLists.txt
            grep -q "$source" openvela_app/smart_band/Makefile
          done
          ! grep -R -E 'SMART_BAND_APP_MUSIC|smart_band_music_app|apps/music_app.c' \
            openvela_app README.md docs
